<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bitki Hub — Print</title>
<link rel="icon" href="assets/mark-green.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@200;300;400;500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<style>
  /* Print-specific overrides */
  @page { size: A4 portrait; margin: 14mm 10mm; }
  html, body {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* Hide chrome that doesn't belong in a static PDF */
  .wa-fab, .wa-card,
  .twk-panel, .twk-toggle,
  .modal-backdrop {
    display: none !important;
  }

  /* Drop sticky positioning so each section flows naturally */
  .site-header, .product-toolbar {
    position: static !important;
    backdrop-filter: none !important;
  }

  /* Don't double-render the header on every page */
  .print-page .site-header { display: none !important; }
  .print-page .footer { display: none !important; }

  /* Page section dividers */
  .print-divider {
    page-break-before: always;
    break-before: page;
    padding: 36px 32px;
    background: #03251c;
    color: #fff;
    margin-top: 40px;
  }
  .print-divider span {
    font-family: 'Alexandria', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  /* Avoid splitting key blocks across pages */
  section, .product-card, .cert, .project,
  .feature-specimen, .home-contact, .cta-band,
  .pd-layout, .contact-layout {
    break-inside: avoid;
    page-break-inside: avoid;
  }

  /* Headlines shouldn't be orphaned */
  h1, h2, h3 {
    break-after: avoid;
    page-break-after: avoid;
  }

  /* Disable animations */
  *, *::before, *::after {
    animation: none !important;
    transition: none !important;
  }

  /* Strip hover scale on cards in print */
  .product-card:hover, .cat-grid > a:hover, .project:hover {
    transform: none !important;
  }

  /* Marquee strip becomes static (just show one row) */
  .strip__track {
    animation: none !important;
    flex-wrap: wrap;
    gap: 16px 32px;
  }

  /* Trim padding so pages don't feel empty */
  section { padding-top: 56px !important; padding-bottom: 56px !important; }

  /* Make sure images don't get cut weirdly */
  img { break-inside: avoid; }

  /* Loading shim before React mounts */
  body { background: #fbfaf5; }
  #print-loading {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    color: #5d7a70; font-family: 'Alexandria', sans-serif;
    background: #fbfaf5;
    z-index: 999;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="print-loading">Preparing print view…</div>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel">
  // Hide the loading shim once React renders something
  const obs = new MutationObserver(() => {
    const el = document.getElementById("print-loading");
    if (el && document.querySelector("#root .site-header")) {
      el.style.display = "none";
      obs.disconnect();
    }
  });
  obs.observe(document.getElementById("root"), { childList: true, subtree: true });
</script>
<script type="text/babel" src="print-app.jsx"></script>
</body>
</html>
